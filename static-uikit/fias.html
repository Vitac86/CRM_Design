<script>
    (function () {
        // ---------- Константы ----------
        const API_BASE = "https://fias-public-service.nalog.ru/api/spas/v2.0";
        const MASTER_TOKEN = "pass";

        const ADDRESS_TYPE = 1; // всегда административное деление
        const DEBUG = false; // true - логи в консоль, false - отключить консольные логи

        const FIELD_DEFS = {
            3: { level: 3, label: "Муниципальный округ", hint: "Выбери муниципальный округ" },
            2: { level: 2, label: "Район", hint: "Выбери район" },
            5: { level: 5, label: "Город", hint: "Выбери город" },
            6: { level: 6, label: "Населённый пункт / поселение", hint: "Выбери населённый пункт" },
            7: { level: 7, label: "Планировочная структура / территория", hint: "Выбери территорию/структуру" },
            8: { level: 8, label: "Улица / УДС", hint: "Выбери улицу/площадь/..." },
            9: { level: 9, label: "Земельный участок", hint: "Выбери земельный участок" },
            10: { level: 10, label: "Дом / строение", hint: "Выбери дом" },
            11: { level: 11, label: "Помещение / квартира", hint: "Выбери помещение/квартиру" },
            12: { level: 12, label: "Комната", hint: "Выбери комнату" },
            17: { level: 17, label: "Машино-место", hint: "Выбери машино-место" },
        };

        const ORDER_ADMIN = [2, 5, 6, 7, 8, 9, 10, 11, 12, 17];

        // ---------- Элементы модального окна ----------
        const el = {
            regionSelect: document.getElementById("modalRegionSelect"),
            topStatus: document.getElementById("modalTopStatus"),
            midStatus: document.getElementById("modalMidStatus"),
            fieldsContainer: document.getElementById("modalFieldsContainer"),
            addressOut: document.getElementById("modalAddressOut"),
            postalCodeOut: document.getElementById("modalPostalCodeOut"),
            log: document.getElementById("modalLog"),
            okBtn: document.getElementById("modalOkBtn"),
            cancelBtn: document.getElementById("modalCancelBtn"),
        };

        // ---------- Состояние ----------
        const state = {
            regions: [],
            region: null,
            currentPath: null,
            selectedByLevel: new Map(),
            optionsFullByLevel: new Map(),
            uiByLevel: new Map(), // level -> { wrap, filter, select, meta }
            abortBatch: null,
            postalCodeCache: new Map(),
            fetchingPostalCode: null,
        };

        // ---------- Вспомогательные функции ----------
        const setLog = (x) => el.log.value = (typeof x === "string") ? x : JSON.stringify(x, null, 2);
        const setStatus = (node, text) => node.textContent = text || "";
        const getToken = () => MASTER_TOKEN;

        function logDebug(...args) {
            if (DEBUG) console.log(...args);
        }

        function normalizeCountrySearch(value) {
            return String(value || '')
                .toLowerCase()
                .replaceAll('ё', 'е')
                .replace(/\s+/g, ' ')
                .trim();
        }

        function syncCountryIso(select) {
            if (!select) return;
            const form = select.closest('form');
            const isoTarget = select.getAttribute('data-iso-target');
            if (!form || !isoTarget) return;

            const hidden = form.querySelector(`[name="${isoTarget}"]`);
            if (!hidden) return;

            const option = select.options[select.selectedIndex];
            hidden.value = option ? (option.getAttribute('data-codeiso1') || '') : '';
        }

        function getCountryOptions(select) {
            return Array.from(select.options).filter(option => option.value !== '');
        }

        function applyCountryFilter(wrap) {
            if (!wrap) return;
            const filter = wrap.querySelector('.js-country-filter');
            const select = wrap.querySelector('.js-country-selector');
            const meta = wrap.querySelector('.js-country-meta');
            if (!filter || !select) return;

            // добавил тут -> после ручного выбора страна фиксируется: фильтр больше не меняет список и не автоподставляет значение.
            if (wrap.getAttribute('data-country-locked') === '1') {
                syncCountryIso(select);
                if (meta) {
                    meta.textContent = 'Страна выбрана вручную. Автофильтр и автоподстановка отключены для этого выбора.';
                }
                return;
            }

            const q = normalizeCountrySearch(filter.value);
            const options = getCountryOptions(select);
            let shown = 0;
            let firstVisible = null;

            options.forEach(option => {
                const key = normalizeCountrySearch(option.getAttribute('data-search-key') || option.value);
                const visible = (q === '') || key.startsWith(q);
                option.hidden = !visible;
                option.disabled = !visible;

                if (visible) {
                    shown++;
                    if (!firstVisible) firstVisible = option;
                }
            });

            // добавил тут -> при пустом фильтре выбран первый элемент полного списка;
            // при введенном префиксе выбран первый элемент отфильтрованного списка.
            if (firstVisible) {
                select.value = firstVisible.value;
            } else {
                select.value = '';
            }
            syncCountryIso(select);

            if (meta) {
                if (q === '') {
                    meta.textContent = shown
                        ? `Показан полный список стран: ${shown}. По умолчанию выбрана первая страна в списке.`
                        : 'Список стран пуст.';
                } else {
                    meta.textContent = shown
                        ? `Найдено стран: ${shown}. Автоматически выбрана первая страна из найденных.`
                        : 'Ничего не найдено: проверьте первую букву или начало названия.';
                }
            }
        }

        function selectCountryByIsoOrName(select, countryName, isoCode) {
            if (!select) return false;
            const wantIso = String(isoCode || '').trim().toUpperCase();
            const wantName = normalizeCountrySearch(countryName);
            const options = getCountryOptions(select);
            let found = null;

            if (wantIso) {
                found = options.find(option => String(option.getAttribute('data-codeiso1') || '').trim().toUpperCase() === wantIso) || null;
            }
            if (!found && wantName) {
                found = options.find(option => normalizeCountrySearch(option.value) === wantName) || null;
            }

            if (!found) return false;

            found.hidden = false;
            found.disabled = false;
            select.value = found.value;
            syncCountryIso(select);
            return true;
        }

        function initCountrySelectors() {
            document.querySelectorAll('.js-country-wrap').forEach(wrap => {
                const filter = wrap.querySelector('.js-country-filter');
                const select = wrap.querySelector('.js-country-selector');
                const meta = wrap.querySelector('.js-country-meta');
                if (!select) return;

                if (filter) {
                    filter.addEventListener('input', function () {
                        applyCountryFilter(wrap);
                    });
                }

                select.addEventListener('change', function () {
                    // добавил тут -> только реальный выбор пользователем фиксирует страну и отключает автоподстановку.
                    wrap.setAttribute('data-country-locked', '1');
                    syncCountryIso(select);
                    if (meta) {
                        meta.textContent = 'Страна выбрана вручную. Дальше фильтр уже не меняет список и не подставляет первую страну.';
                    }
                });

                // добавил тут -> первое состояние: полный список виден, выбран первый вариант, ISO hidden синхронизирован.
                applyCountryFilter(wrap);
                syncCountryIso(select);
            });
        }

        function lastHierarchy(address) {
            const h = address?.hierarchy;
            return (Array.isArray(h) && h.length) ? h[h.length - 1] : null;
        }

        function updateOkButtonState() {
            const hasAddress = el.addressOut.textContent !== "—";
            el.okBtn.disabled = !hasAddress;
        }

        // Извлечение почтового индекса из объекта (рекурсивно)
        function extractPostalCode(addr) {
            if (!addr) return null;
            if (addr.postal_code) return addr.postal_code;
            if (addr.address_details && addr.address_details.postal_code) return addr.address_details.postal_code;
            if (addr.hierarchy && Array.isArray(addr.hierarchy)) {
                for (const h of addr.hierarchy) {
                    const res = extractPostalCode(h);
                    if (res) return res;
                }
            }
            return null;
        }

        // Сбор всех индексов из выбранных объектов
        function collectAllPostalCodes() {
            const codes = new Set();
            const order = ORDER_ADMIN;
            for (const lvl of order) {
                const addr = state.selectedByLevel.get(lvl);
                if (!addr) continue;
                const cached = state.postalCodeCache.get(addr.object_id);
                if (cached) {
                    codes.add(cached);
                    continue;
                }
                const postal = extractPostalCode(addr);
                if (postal) codes.add(postal);
            }
            return Array.from(codes).sort((a, b) => a.localeCompare(b, undefined, { numeric: true }));
        }

        function updatePostalCodeDisplayAll() {
            const codes = collectAllPostalCodes();
            el.postalCodeOut.textContent = codes.length ? `Индекс: ${codes.join(', ')}` : "Индекс: —";
        }

        // Асинхронное получение индекса через API
        async function fetchPostalCodeForObject(objectId) {
            logDebug(`=== fetchPostalCodeForObject called with object_id=${objectId} ===`);
            if (state.postalCodeCache.has(objectId)) {
                logDebug(`object_id ${objectId} already in cache, returning cached value`);
                return state.postalCodeCache.get(objectId);
            }
            if (state.fetchingPostalCode === objectId) {
                logDebug(`object_id ${objectId} is already being fetched, skipping`);
                return;
            }
            state.fetchingPostalCode = objectId;
            logDebug(`>>> Starting fetch for object_id ${objectId}`);
            try {
                const qs = new URLSearchParams({ object_id: String(objectId), address_type: String(ADDRESS_TYPE) });
                const url = `${API_BASE}/GetAddressItemById?${qs.toString()}`;
                logDebug(`Request URL: ${url}`);
                setLog({ request: "GetAddressItemById (postal)", full_url: url, qs: Object.fromEntries(qs.entries()) });

                const resp = await apiFetch(`/GetAddressItemById?${qs.toString()}`, { method: "GET" });
                logDebug('Response received:', resp);
                setLog({ response: resp });

                const addr = Array.isArray(resp?.addresses) ? resp.addresses[0] : null;
                const postal = extractPostalCode(addr);
                if (postal) {
                    state.postalCodeCache.set(objectId, postal);
                    logDebug(`Cached postal_code ${postal} for object_id ${objectId}`);
                } else {
                    state.postalCodeCache.set(objectId, '');
                    logDebug(`No postal_code found for object_id ${objectId}`);
                }
                updatePostalCodeDisplayAll();
            } catch (e) {
                console.error(`Error fetching postal code for object_id ${objectId}:`, e);
                setLog({ error: `Ошибка получения индекса для object_id ${objectId}`, message: String(e) });
                state.postalCodeCache.set(objectId, '');
            } finally {
                state.fetchingPostalCode = null;
                logDebug(`Fetch completed for object_id ${objectId}`);
            }
        }

        function ensurePostalCodeForAll() {
            logDebug('=== ensurePostalCodeForAll called ===');
            const order = ORDER_ADMIN;
            for (const lvl of order) {
                const addr = state.selectedByLevel.get(lvl);
                if (!addr) {
                    logDebug(`Level ${lvl} not selected, skip`);
                    continue;
                }
                const inCache = state.postalCodeCache.has(addr.object_id);
                const hasPostal = !!extractPostalCode(addr);
                logDebug(`Level ${lvl}, object_id ${addr.object_id}, inCache=${inCache}, hasPostal=${hasPostal}, willFetch=${!inCache && !hasPostal}`);
                if (!inCache && !hasPostal) {
                    logDebug(`>>> Will fetch for object_id ${addr.object_id}`);
                    fetchPostalCodeForObject(addr.object_id);
                } else {
                    logDebug(`>>> No fetch needed for object_id ${addr.object_id}`);
                }
            }
            updatePostalCodeDisplayAll();
        }

        // ---------------- Функции сортировки (без изменений) ----------------
        function isNum(x) {
            if (x == null) return false;
            const s = String(x).trim();
            if (!s) return false;
            return !isNaN(Number(s));
        }
        function cmpStr(a, b) { return String(a || "").localeCompare(String(b || ""), "ru", { sensitivity: "base" }); }
        function cmpNumOrStr(a, b) {
            const an = isNum(a), bn = isNum(b);
            if (an && bn) return Number(a) - Number(b);
            if (an && !bn) return -1;
            if (!an && bn) return 1;
            return cmpStr(a, b);
        }
        function compareTypes(a, b) {
            const A = lastHierarchy(a) || {};
            const B = lastHierarchy(b) || {};
            return cmpStr(A.type_short_name || A.type_name, B.type_short_name || B.type_name);
        }
        function compareNames(a, b) {
            const A = lastHierarchy(a) || {};
            const B = lastHierarchy(b) || {};
            return cmpStr(A.name, B.name);
        }
        function compareNumbers(a, b) {
            const A = lastHierarchy(a) || {};
            const B = lastHierarchy(b) || {};
            return cmpNumOrStr(A.number, B.number);
        }
        function compareHouses(a, b) {
            const A = lastHierarchy(a) || {};
            const B = lastHierarchy(b) || {};
            let r = compareTypes(a, b); if (r) return r;
            r = cmpNumOrStr(A.number, B.number); if (r) return r;
            r = cmpStr(A.add_type1_short_name, B.add_type1_short_name); if (r) return r;
            r = cmpNumOrStr(A.add_number1, B.add_number1); if (r) return r;
            r = cmpStr(A.add_type2_short_name, B.add_type2_short_name); if (r) return r;
            return cmpNumOrStr(A.add_number2, B.add_number2);
        }
        function sortAddressesForLevel(level, list) {
            const arr = [...(list || [])];
            arr.sort((a, b) => {
                const la = a?.object_level_id ?? 0;
                const lb = b?.object_level_id ?? 0;
                if (la !== lb) return la - lb;

                if ([9, 17].includes(level)) return compareNumbers(a, b);
                if (level === 10) return compareHouses(a, b);
                if ([11, 12].includes(level)) {
                    let r = compareTypes(a, b); if (r) return r;
                    return compareNumbers(a, b);
                }
                let r = compareTypes(a, b); if (r) return r;
                return compareNames(a, b);
            });
            return arr;
        }

        // ---------------- Построение адреса ----------------
        const TYPE_MAP = new Map([
            ["г", "город"], ["город", "город"],
            ["ул", "улица"], ["улица", "улица"],
            ["пр-кт", "проспект"], ["просп", "проспект"], ["проспект", "проспект"],
            ["пер", "переулок"], ["переулок", "переулок"],
            ["ш", "шоссе"], ["шоссе", "шоссе"],
            ["наб", "набережная"], ["набережная", "набережная"],
            ["пл", "площадь"], ["площадь", "площадь"],
            ["б-р", "бульвар"], ["бульвар", "бульвар"],
            ["мкр", "микрорайон"], ["микрорайон", "микрорайон"],
            ["р-н", "район"], ["район", "район"],
            ["пос", "посёлок"], ["п", "посёлок"], ["посёлок", "посёлок"],
            ["тер", "территория"], ["территория", "территория"],
        ]);

        const ADD_TYPE_MAP = new Map([
            ["лит", "литера"], ["литера", "литера"],
            ["корп", "корпус"], ["корпус", "корпус"],
            ["стр", "строение"], ["строение", "строение"],
            ["вл", "владение"], ["владение", "владение"],
            ["соор", "сооружение"], ["сооружение", "сооружение"],
        ]);

        function normTypeName(h) {
            const raw = String(h?.type_name || h?.type_short_name || "").trim();
            if (!raw) return "";
            const low = raw.toLowerCase();
            return TYPE_MAP.get(low) || low;
        }

        function normAddTypeName(raw) {
            const s = String(raw || "").trim().toLowerCase();
            if (!s) return "";
            return ADD_TYPE_MAP.get(s) || s;
        }

        function segmentFromHierarchy(level, h) {
            if (!h) return null;

            if (level === 10) {
                const t = normTypeName(h) || "дом";
                const n = String(h.number || "").trim();
                if (!n) return null;

                let s = `${t} ${n}`;

                const at1 = normAddTypeName(h.add_type1_short_name || h.add_type1_name);
                const an1 = String(h.add_number1 || "").trim();
                if (at1 && an1) s += ` ${at1} ${an1}`;

                const at2 = normAddTypeName(h.add_type2_short_name || h.add_type2_name);
                const an2 = String(h.add_number2 || "").trim();
                if (at2 && an2) s += ` ${at2} ${an2}`;

                return s.trim();
            }

            if ([9, 11, 12, 17].includes(level)) {
                const t = normTypeName(h);
                const n = String(h.number || "").trim();
                if (t && n) return `${t} ${n}`.trim();
                if (t && h.name) return `${t} ${String(h.name).trim()}`.trim();
                if (h.name) return String(h.name).trim();
                return null;
            }

            const t = normTypeName(h);
            const name = String(h.name || "").trim();
            if (t && name) return `${t} ${name}`.trim();

            const fn = String(h.full_name_short || h.full_name || "").trim();
            if (!fn) return null;
            if (fn.includes(",")) return fn.split(",").pop().trim();
            return fn;
        }

        function getShortName(addr) {
            const h = lastHierarchy(addr);
            if (!h) return addr.full_name || `id=${addr.object_id}`;
            const seg = segmentFromHierarchy(addr.object_level_id, h);
            return seg || addr.full_name || `id=${addr.object_id}`;
        }

        function canonical(s) {
            return String(s || "")
                .toLowerCase()
                .replaceAll("ё", "е")
                .replace(/[\s,.;:()№"']/g, " ")
                .replace(/\s+/g, " ")
                .trim();
        }

        function buildAddressText() {
            const parts = [];
            const seen = new Set();

            if (state.region?.full_name) {
                const r = state.region.full_name.trim();
                const cr = canonical(r);
                if (r && !seen.has(cr)) { parts.push(r); seen.add(cr); }
            }

            for (const lvl of ORDER_ADMIN) {
                const sel = state.selectedByLevel.get(lvl);
                if (!sel) continue;

                const h = lastHierarchy(sel);
                const seg = segmentFromHierarchy(lvl, h);
                if (!seg) continue;

                const cs = canonical(seg);
                if (!seen.has(cs)) {
                    parts.push(seg);
                    seen.add(cs);
                }
            }

            el.addressOut.textContent = parts.length ? parts.join(", ") : "—";
            ensurePostalCodeForAll();
            updateOkButtonState();
        }

        // ---------------- API ----------------
        async function apiFetch(path, { method = "GET", body = null, signal } = {}) {
            const token = getToken();
            const headers = { "accept": "application/json" };
            if (token) headers["master-token"] = token;
            if (body != null) headers["content-type"] = "application/json";

            const res = await fetch(`${API_BASE}${path}`, {
                method,
                headers,
                body: body != null ? JSON.stringify(body) : undefined,
                mode: "cors",
                signal
            });

            const ct = (res.headers.get("content-type") || "").toLowerCase();
            const payload = ct.includes("application/json") ? await res.json().catch(() => null) : await res.text().catch(() => "");
            if (!res.ok) throw new Error(`HTTP ${res.status} ${res.statusText}: ${typeof payload === "string" ? payload : JSON.stringify(payload)}`);
            return payload;
        }

        async function getAddressItems(level, path, signal) {
            const body = { address_levels: [level], address_type: ADDRESS_TYPE, path: String(path), include_hist: true };
            setLog({ request: "GetAddressItems", body });
            const resp = await apiFetch("/GetAddressItems", { method: "POST", body, signal });
            const addrs = Array.isArray(resp?.addresses) ? resp.addresses : [];
            return addrs.filter(a => Number(a?.object_level_id) === Number(level));
        }

        async function getAddressItemById(objectId, signal) {
            const qs = new URLSearchParams({ object_id: String(objectId), address_type: String(ADDRESS_TYPE) });
            const url = `/GetAddressItemById?${qs.toString()}`;
            setLog({ request: "GetAddressItemById", full_url: `${API_BASE}${url}`, qs: Object.fromEntries(qs.entries()) });
            const resp = await apiFetch(url, { method: "GET", signal });
            setLog({ response: resp });
            const arr = Array.isArray(resp?.addresses) ? resp.addresses : [];
            return arr[0] || null;
        }

        // ---------------- Уровни ----------------
        function getOrderToLoadAfter(level) {
            const idx = ORDER_ADMIN.indexOf(level);
            return idx >= 0 ? ORDER_ADMIN.slice(idx + 1) : ORDER_ADMIN;
        }

        function hideLevel(level) {
            const ui = state.uiByLevel.get(level);
            if (!ui) return;
            ui.wrap.classList.add("uk-hidden");
            ui.select.disabled = true;
            ui.select.innerHTML = "";
            ui.select.value = "";
            ui.filter.value = "";
            ui.meta.textContent = "";
            state.optionsFullByLevel.delete(level);
            state.selectedByLevel.delete(level);
        }

        function setFullOptions(level, list) {
            const sorted = sortAddressesForLevel(level, list);
            state.optionsFullByLevel.set(level, sorted);
        }

        function renderOptions(level, displayList, selectedId = null, metaText = null) {
            const ui = state.uiByLevel.get(level);
            if (!ui) return;

            const def = FIELD_DEFS[level];
            const sorted = sortAddressesForLevel(level, displayList);

            ui.select.innerHTML = "";
            const ph = document.createElement("option");
            ph.value = "";
            ph.textContent = `— ${def.hint} —`;
            ui.select.appendChild(ph);

            for (const a of sorted) {
                const opt = document.createElement("option");
                opt.value = String(a.object_id);
                opt.textContent = getShortName(a);
                ui.select.appendChild(opt);
            }

            ui.select.disabled = false;
            ui.wrap.classList.remove("uk-hidden");
            ui.meta.textContent = metaText || `вариантов: ${sorted.length}`;

            if (selectedId != null) ui.select.value = String(selectedId);
        }

        function applyLocalFilter(level) {
            const ui = state.uiByLevel.get(level);
            if (!ui) return;

            const q = ui.filter.value.trim().toLowerCase();
            const full = state.optionsFullByLevel.get(level) || [];
            const selected = state.selectedByLevel.get(level) || null;

            let filtered = full;
            if (q) filtered = full.filter(a => {
                const short = getShortName(a).toLowerCase();
                const fullName = (a.full_name || "").toLowerCase();
                return short.includes(q) || fullName.includes(q);
            });

            if (selected && !filtered.some(x => String(x.object_id) === String(selected.object_id))) {
                filtered = [selected, ...filtered];
            }

            renderOptions(
                level,
                filtered,
                selected ? selected.object_id : null,
                q ? `вариантов: ${filtered.length} (фильтр: "${q}")` : `вариантов: ${filtered.length}`
            );
        }

        function ensureSelectedSingle(level, addr) {
            if (!addr || !addr.object_id) return;
            if (addr.is_active === false) return;

            const full = state.optionsFullByLevel.get(level) || [];
            if (!full.some(x => String(x.object_id) === String(addr.object_id))) {
                setFullOptions(level, [addr, ...full]);
            }

            state.selectedByLevel.set(level, addr);
            applyLocalFilter(level);
            const ui = state.uiByLevel.get(level);
            if (ui) ui.select.value = String(addr.object_id);
        }

        async function loadNextLevels(from, basePath) {
            if (!basePath) return;
            const toLoad = getOrderToLoadAfter(from);
            if (!toLoad.length) return;

            if (state.abortBatch) state.abortBatch.abort();
            const ctrl = new AbortController();
            state.abortBatch = ctrl;

            setStatus(el.midStatus, `Загружаю уровни: ${toLoad.join(", ")}…`);
            state.currentPath = String(basePath);

            const jobs = toLoad.map(async (lvl) => {
                try {
                    const items = await getAddressItems(lvl, basePath, ctrl.signal);
                    return { lvl, items, ok: true };
                } catch (e) {
                    return { lvl, items: [], ok: false, err: String(e) };
                }
            });

            const results = await Promise.all(jobs);
            if (ctrl.signal.aborted) return;

            for (const r of results) {
                if (!r.ok) { hideLevel(r.lvl); setLog({ level: r.lvl, error: r.err }); continue; }
                if (r.items && r.items.length) {
                    setFullOptions(r.lvl, r.items);
                    renderOptions(r.lvl, state.optionsFullByLevel.get(r.lvl), state.selectedByLevel.get(r.lvl)?.object_id ?? null);
                } else {
                    hideLevel(r.lvl);
                }
            }

            setStatus(el.midStatus, "Готово. Показаны только поля, где есть варианты.");
            buildAddressText();
        }

        // ---------------- Синхронизация родителей ----------------
        function makePathForHierarchyPlace(fullPath, hierarchyPlace) {
            if (!fullPath) return null;
            const parts = String(fullPath).split(".");
            const hp = Number(hierarchyPlace);
            if (!hp || hp < 1) return null;
            if (parts.length < hp) return null;
            return parts.slice(0, hp).join(".");
        }

        function asAddressFromHierarchyItem(hItem, computedPath) {
            const full_name =
                hItem.full_name ||
                hItem.full_name_short ||
                (hItem.name && (hItem.type_short_name || hItem.type_name) ? `${hItem.name} ${hItem.type_short_name || hItem.type_name}` : hItem.name) ||
                null;

            return {
                object_id: hItem.object_id,
                object_level_id: hItem.object_level_id,
                full_name,
                path: computedPath || null,
                is_active: (typeof hItem.is_active === "boolean") ? hItem.is_active : true,
                hierarchy: [hItem],
                postal_code: hItem.postal_code,
            };
        }

        function syncParentsByHierarchy(chosen) {
            if (!chosen || chosen.is_active === false) return;

            const chosenLevel = Number(chosen.object_level_id || 0);
            const order = ORDER_ADMIN;

            const map = new Map(); // lvl -> addr
            for (const h of (chosen.hierarchy || [])) {
                const lvl = Number(h?.object_level_id);
                if (!lvl || !FIELD_DEFS[lvl]) continue;
                if (typeof h.is_active === "boolean" && h.is_active === false) continue;

                const p = makePathForHierarchyPlace(chosen.path, h.hierarchy_place) || null;
                map.set(lvl, asAddressFromHierarchyItem(h, p));
            }

            for (const lvl of order) {
                if (lvl >= chosenLevel) break;
                const parent = map.get(lvl);
                if (parent) ensureSelectedSingle(lvl, parent);
                else hideLevel(lvl);
            }
        }

        async function applyChosenObject(chosen, explicitLevel = null) {
            if (!chosen) return;
            const lvl = Number(explicitLevel || chosen.object_level_id || 0);
            if (!lvl || !FIELD_DEFS[lvl]) return;

            ensureSelectedSingle(lvl, chosen);
            syncParentsByHierarchy(chosen);

            state.currentPath = chosen.path || state.currentPath || null;

            for (const lower of getOrderToLoadAfter(lvl)) hideLevel(lower);

            buildAddressText();
            if (chosen.path) await loadNextLevels(lvl, chosen.path);
        }

        // ---------------- Регионы ----------------
        async function loadRegions() {
            setStatus(el.topStatus, "Загружаю регионы…");
            try {
                const resp = await apiFetch("/GetRegions", { method: "GET" });
                const regions = Array.isArray(resp?.addresses) ? resp.addresses : (Array.isArray(resp) ? resp : []);
                regions.sort((a, b) => String(a.full_name || "").localeCompare(String(b.full_name || ""), "ru"));

                state.regions = regions;
                el.regionSelect.innerHTML = `<option value="">— выбери регион —</option>`;
                for (const r of regions) {
                    const opt = document.createElement("option");
                    opt.value = String(r.object_id);
                    opt.textContent = r.full_name || `(id=${r.object_id})`;
                    el.regionSelect.appendChild(opt);
                }

                setStatus(el.topStatus, `Ок: регионов ${regions.length}`);
            } catch (e) {
                el.regionSelect.innerHTML = `<option value="">— не удалось загрузить регионы —</option>`;
                setStatus(el.topStatus, "Не удалось загрузить регионы. Проверьте токен. (см. лог)");
                setLog(String(e));
            }
        }

        function resetAll(keepRegions = true) {
            if (state.abortBatch) state.abortBatch.abort();
            state.abortBatch = null;

            state.region = null;
            state.currentPath = null;
            state.selectedByLevel.clear();
            state.optionsFullByLevel.clear();
            state.postalCodeCache.clear();

            for (const lvl of Object.keys(FIELD_DEFS).map(Number)) hideLevel(lvl);

            if (!keepRegions) {
                el.regionSelect.innerHTML = `<option value="">— загрузить регионы —</option>`;
                state.regions = [];
            } else {
                el.regionSelect.value = "";
            }

            setStatus(el.midStatus, "");
            buildAddressText();
        }

        // ---------------- Установка UI для уровней ----------------
        function installFieldsUI() {
            el.fieldsContainer.innerHTML = "";
            state.uiByLevel.clear();

            const levels = Object.keys(FIELD_DEFS).map(Number).sort((a, b) => a - b);
            for (const level of levels) {
                const def = FIELD_DEFS[level];

                const wrap = document.createElement("div");
                wrap.className = "uk-margin uk-hidden";

                const lab = document.createElement("label");
                lab.className = "uk-form-label";
                lab.textContent = `${def.label} (level ${level})`;

                const filter = document.createElement("input");
                filter.className = "uk-input";
                filter.placeholder = "Фильтр по списку…";
                filter.addEventListener("input", () => {
                    if (!wrap.classList.contains("uk-hidden")) applyLocalFilter(level);
                });

                const sel = document.createElement("select");
                sel.className = "uk-select";
                sel.disabled = true;

                const meta = document.createElement("div");
                meta.className = "uk-text-meta";

                sel.addEventListener("change", async () => {
                    const val = sel.value;
                    if (!val) {
                        const order = ORDER_ADMIN;
                        const idx = order.indexOf(level);
                        for (let i = idx; i < order.length; i++) hideLevel(order[i]);
                        buildAddressText();
                        return;
                    }

                    const full = state.optionsFullByLevel.get(level) || [];
                    const chosen = full.find(x => String(x.object_id) === String(val));
                    if (!chosen) return;

                    state.selectedByLevel.set(level, chosen);

                    if (chosen.hierarchy && chosen.path) syncParentsByHierarchy(chosen);
                    for (const l of getOrderToLoadAfter(level)) hideLevel(l);

                    const nextPath = chosen.path || (state.currentPath ? `${state.currentPath}.${chosen.object_id}` : String(chosen.object_id));
                    state.currentPath = String(nextPath);

                    buildAddressText();
                    await loadNextLevels(level, nextPath);
                });

                wrap.append(lab, filter, sel, meta);
                el.fieldsContainer.appendChild(wrap);
                state.uiByLevel.set(level, { wrap, filter, select: sel, meta });
            }
        }

        // ---------------- Сбор данных для формы ----------------
        function collectAddressData() {
            const data = {
                fullAddress: el.addressOut.textContent,
                fiasObjectId: null,
                country: "Российская Федерация",
                countryCodeIso: "RU",
                region: "",
                regionId: null,
                index: "",
                city: "",
                cityId: null,
                district: "",
                districtId: null,
                settlement: "",
                settlementId: null,
                street: "",
                streetId: null,
                house: "",
                houseId: null,
                corps: "",
                flat: "",
                flatId: null,
            };

            if (state.region) {
                data.region = state.region.full_name || "";
                data.regionId = state.region.object_id;
            }

            const order = ORDER_ADMIN;
            for (const lvl of order) {
                const addr = state.selectedByLevel.get(lvl);
                if (!addr) continue;
                const h = lastHierarchy(addr);
                const seg = segmentFromHierarchy(lvl, h);
                const objId = addr.object_id;
                switch (lvl) {
                    case 2: // район
                    case 3: // муниципальный округ
                        data.district = seg;
                        data.districtId = objId;
                        break;
                    case 5:
                        data.city = seg;
                        data.cityId = objId;
                        break;
                    case 6:
                        data.settlement = seg;
                        data.settlementId = objId;
                        break;
                    case 8:
                        data.street = seg;
                        data.streetId = objId;
                        break;
                    case 10:
                        data.house = seg;
                        data.houseId = objId;
                        let corpsParts = [];
                        if (h.add_type1_short_name && h.add_number1) {
                            corpsParts.push(`${h.add_type1_short_name} ${h.add_number1}`);
                        }
                        if (h.add_type2_short_name && h.add_number2) {
                            corpsParts.push(`${h.add_type2_short_name} ${h.add_number2}`);
                        }
                        if (corpsParts.length) {
                            data.corps = corpsParts.join(', ');
                        }
                        break;
                    case 11:
                        data.flat = seg;
                        data.flatId = objId;
                        break;
                }
            }

            if (!data.city && state.region && /^(г|город)\s/i.test(state.region.full_name)) {
                data.city = state.region.full_name;
            }

            const codes = collectAllPostalCodes();
            data.index = codes.join(', ');

            const lastLevels = order.filter(l => state.selectedByLevel.has(l));
            if (lastLevels.length) {
                const lastLvl = Math.max(...lastLevels);
                const lastAddr = state.selectedByLevel.get(lastLvl);
                if (lastAddr) {
                    data.fiasObjectId = lastAddr.object_id;
                }
            }

            return data;
        }

        function fillParentForm() {
            const data = collectAddressData();
            const form = document.forms['physform'] || document.querySelector('form[name="physform"]');
            if (!form) {
                console.error('Форма с именем "physform" не найдена');
                return;
            }
            const setField = (name, value) => {
                const input = form.querySelector(`[name="${name}"]`);
                if (input) input.value = value || "";
            };
            setField('data[new][fias_object_id]', data.fiasObjectId || '');
            setField('data[new][country]', data.country);
            setField('data[new][country_code_iso]', data.countryCodeIso || 'RU');
            const countrySelectBeforeRegion = form.querySelector('.js-country-selector[name="data[new][country]"]');
            if (countrySelectBeforeRegion) {
                const selectedByCountryRef = selectCountryByIsoOrName(countrySelectBeforeRegion, data.country, data.countryCodeIso || 'RU');
                if (!selectedByCountryRef) {
                    setField('data[new][country_code_iso]', data.countryCodeIso || 'RU');
                }
            }
            setField('data[new][region]', data.region);
            setField('data[new][index]', data.index);
            setField('data[new][city]', data.city);
            setField('data[new][district]', data.district);
            setField('data[new][settlement]', data.settlement);
            setField('data[new][street]', data.street);
            setField('data[new][house]', data.house);
            setField('data[new][corps]', data.corps);
            setField('data[new][flat]', data.flat);

            const countrySelect = form.querySelector('.js-country-selector[name="data[new][country]"]');
            if (countrySelect && countrySelect.value) {
                syncCountryIso(countrySelect);
            }
        }

        // ---------------- Открытие/закрытие ----------------
        function openModal() {
            UIkit.modal('#fiasModal').show();
        }

        function closeModal() {
            UIkit.modal('#fiasModal').hide();
        }

        window.openFiasModal = openModal;

        el.okBtn.addEventListener("click", () => {
            fillParentForm();
            closeModal();
        });

        el.cancelBtn.addEventListener("click", closeModal);

        // ---------------- Инициализация ----------------
        function init() {
            el.regionSelect.addEventListener("change", async () => {
                const id = el.regionSelect.value;
                if (!id) { resetAll(true); return; }
                state.region = state.regions.find(r => String(r.object_id) === String(id)) || null;
                for (const lvl of Object.keys(FIELD_DEFS).map(Number)) hideLevel(lvl);
                state.selectedByLevel.clear();
                const basePath = (state.region && state.region.path) ? state.region.path : String(id);
                state.currentPath = String(basePath);
                buildAddressText();
                await loadNextLevels("region", basePath);
            });

            installFieldsUI();
            initCountrySelectors();
            buildAddressText();
            loadRegions();
        }

        if (document.readyState === "loading") {
            document.addEventListener("DOMContentLoaded", init);
        } else {
            init();
        }
    })();
</script>
