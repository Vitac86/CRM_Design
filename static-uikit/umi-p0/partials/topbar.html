<header class="crm-topbar" data-entity="layout-topbar">
  <button class="uk-button uk-button-default" data-sidebar-toggle aria-label="Открыть меню"><span uk-icon="menu"></span></button>
  <form action="#" method="get" class="crm-search" data-form="global-search" data-action="global-search" data-filter="global-search">
    <span class="crm-search-icon" uk-icon="search"></span>
    <input class="uk-input crm-input" name="query" placeholder="Глобальный поиск" value="{{ search.query }}"/>
  </form>
  <div class="crm-user" data-entity="current-user">
    <div>
      <div>{{ current_user.name }}</div>
      <small>{{ current_user.role }}</small>
    </div>
    <div class="crm-avatar">{{ current_user.initials }}</div>
  </div>
</header>
