<form action="#" method="get" data-form="generic-filters" data-action="apply-filters" class="crm-toolbar crm-filter-panel uk-grid-small" uk-grid data-filter="generic">
  <div class="uk-width-1-1 uk-width-1-3@m">
    <input class="uk-input crm-input" name="search" placeholder="Поиск"/>
  </div>
  <div class="uk-width-1-2 uk-width-1-6@m">
    <select class="uk-select crm-select" name="status">
      <option value="">Статус</option>
      <option value="active">Активный</option>
      <option value="pending">На проверке</option>
    </select>
  </div>
  <div class="uk-width-1-2 uk-width-1-6@m">
    <button type="button" class="uk-button uk-button-default crm-button crm-button-ghost" data-action="reset-filters">Сбросить всё</button>
  </div>
</form>
