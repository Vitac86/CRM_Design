<!-- UMI TODO: render inside layout/base main content slot -->

<section class="crm-page" data-page="error">
  <div class="crm-error-state">
    <div class="crm-card uk-card uk-card-body crm-section crm-error-card" data-entity="error-card">
      <h1 data-entity="page-title">Ошибка {{ error.code }}</h1>
      <p>{{ error.message }}</p>
      <p class="uk-text-meta">Request ID: {{ error.request_id }}</p>
      <a href="dashboard.html" class="uk-button crm-button-primary crm-button" data-action="go-dashboard">На дашборд</a>
    </div>
  </div>
</section>
