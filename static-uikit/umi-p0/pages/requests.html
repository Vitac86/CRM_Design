<!-- Reference: static-uikit/pages/requests.html -->
<!-- UMI TODO: render inside layout/base main content slot -->

<section class="crm-page" data-page="requests">
  <div class="crm-page-header crm-page-header-row">
    <h1>Поручения</h1>
    <div class="crm-page-actions">
      <button type="button" class="uk-button uk-button-default crm-button" data-action="export-requests">Экспорт</button>
    </div>
  </div>

  <form action="#" method="post" data-form="request-create" data-action="create-request" class="crm-card uk-card uk-card-body crm-form-section uk-margin-bottom">
    <div class="crm-form-section-head">
      <h3>Создание поручения</h3>
      <span class="crm-badge info" data-status="draft">Черновик</span>
    </div>
    <!-- UMI TODO: populate clients/contracts/currencies dictionaries -->
    <div class="crm-form-grid uk-grid-small" uk-grid>
      <div class="uk-width-1-3@m"><label class="uk-form-label">Тип поручения <span class="crm-required">*</span></label><select class="uk-select crm-select" name="request-type"><option value="">Выберите тип</option></select></div>
      <div class="uk-width-1-3@m"><label class="uk-form-label">Клиент <span class="crm-required">*</span></label><select class="uk-select crm-select" name="client-id"><option value="">Выберите клиента</option></select></div>
      <div class="uk-width-1-3@m"><label class="uk-form-label">Договор <span class="crm-required">*</span></label><select class="uk-select crm-select" name="contract-id"><option value="">Выберите договор</option></select></div>
      <div class="uk-width-1-3@m"><label class="uk-form-label">Сумма <span class="crm-required">*</span></label><input class="uk-input crm-input" name="amount" value="{{ draft.amount }}"/></div>
      <div class="uk-width-1-3@m"><label class="uk-form-label">Валюта</label><select class="uk-select crm-select" name="currency"><option value="">Выберите валюту</option></select></div>
    </div>
    <div class="crm-footer-actions">
      <button class="uk-button uk-button-default crm-button" type="submit" data-action="save-request">Сохранить</button>
      <button class="uk-button uk-button-default crm-button" type="button" data-action="print-request">Распечатать</button>
      <button class="uk-button crm-button-primary crm-button" type="button" data-action="export-request">Экспорт</button>
    </div>
  </form>
  <!-- UMI TODO: handle create-request submit server-side -->

  <form action="#" method="get" data-form="requests-filters" data-action="filter-requests" class="crm-toolbar crm-filter-panel uk-grid-small" uk-grid data-filter="requests">
    <div class="uk-width-1-1 uk-width-1-3@m"><input class="uk-input crm-input" name="request-search" placeholder="Поиск по номеру/клиенту"/></div>
    <div class="uk-width-1-2 uk-width-1-6@m"><input class="uk-input crm-input" name="client-code" placeholder="Код клиента"/></div>
    <div class="uk-width-1-2 uk-width-1-6@m"><select class="uk-select crm-select" name="request-status"><option value="">Статус</option></select></div>
    <div class="uk-width-1-2 uk-width-1-6@m"><button type="reset" class="uk-button uk-button-default crm-button crm-button-ghost" data-action="reset-filters">Очистить фильтры</button></div>
  </form>

  <div class="crm-card crm-table crm-table-wrapper" data-entity="request-table">
    <table class="uk-table uk-table-divider uk-table-hover">
      <thead><tr><th>Номер поручения</th><th>Вид поручения</th><th>Клиент</th><th>Сумма</th><th>Валюта</th><th>Статус</th><th>Дата</th></tr></thead>
      <tbody>
        <!-- UMI TODO: render requests rows in server-side loop -->
        {{ request_rows }}
      </tbody>
    </table>
    <div class="crm-empty-state" data-entity="empty-state" hidden><div class="crm-empty-state-title">Нет поручений</div><div class="crm-empty-state-text">Измените параметры поиска или создайте новое поручение.</div></div>
  </div>
</section>
