<!-- Reference: static-uikit/pages/depository.html -->
<!-- UMI TODO: render inside layout/base main content slot -->
<section class="crm-page" data-page="depository">
  <div class="crm-page-header"><h1 data-entity="page-title">Депозитарий</h1></div>
  <form action="#" method="post" data-form="depository-filters" data-action="filter-depository" class="crm-toolbar crm-filter-panel uk-grid-small" uk-grid data-filter="depository">
    <div class="uk-width-1-1 uk-width-1-3@m"><input class="uk-input crm-input" name="depository-search" placeholder="Поиск по отчёту/счёту депо"/></div>
    <div class="uk-width-1-2 uk-width-1-6@m"><select class="uk-select crm-select" name="depository-status"><option>Статус доставки</option><option>Доставлен</option><option>Ошибка</option></select></div>
    <div class="uk-width-1-2 uk-width-1-6@m"><button class="uk-button uk-button-default crm-button crm-button-ghost" type="reset" data-action="reset-filters">Очистить фильтры</button></div>
  </form>

  <!-- UMI TODO: render delivery history timeline for selected depository report -->
  <div class="crm-card crm-table crm-table-wrapper"><table class="uk-table uk-table-divider uk-table-hover"><thead><tr><th>Файл</th><th>Дата отправки</th><th>Канал</th><th>Результат</th><th>Действия</th></tr></thead><tbody>
    <tr data-entity="depository-report" data-id="{{ depositoryReport.id }}"><td>{{ depositoryReport.fileName }}</td><td>{{ depositoryReport.sentAt }}</td><td><span class="crm-badge info" data-status="delivery-sftp">SFTP</span></td><td><span class="crm-badge danger" data-status="delivery-error">Ошибка</span></td><td><button class="uk-button uk-button-default crm-button" type="button" data-action="download-report">Скачать</button> <button class="uk-button uk-button-default crm-button" type="button" data-action="resend-report">Переотправить</button></td></tr>
  </tbody></table></div>
</section>
