<!-- Reference: static-uikit/pages/middle-office-reports.html -->
<!-- UMI TODO: render inside layout/base main content slot -->
<section class="crm-page" data-page="middle-office-reports">
  <div class="crm-page-header crm-page-header-row"><h1 data-entity="page-title">Журнал отправленных отчётов</h1><div class="crm-page-actions"><button class="uk-button uk-button-default crm-button" type="button" data-action="export-reports">Экспорт</button></div></div>
  <form action="#" method="post" data-form="middle-office-reports-filters" data-action="filter-middle-office-reports" class="crm-toolbar crm-filter-panel uk-grid-small" uk-grid data-filter="middle-office-reports">
    <div class="uk-width-1-1 uk-width-1-3@m"><input class="uk-input crm-input" name="reports-search" placeholder="Поиск по отчету/клиенту"/></div>
    <div class="uk-width-1-2 uk-width-1-6@m"><select class="uk-select crm-select" name="delivery-status"><option>Статус доставки</option><option>Доставлен</option><option>Ошибка</option><option>Ожидает</option></select></div>
    <div class="uk-width-1-2 uk-width-1-6@m"><button class="uk-button uk-button-default crm-button crm-button-ghost" type="button" data-action="reset-filters">Очистить фильтры</button></div>
  </form>

  <!-- UMI TODO: keep selected report state and details server-side -->
  <div class="crm-split-view" data-entity="report-split-view">
    <div class="crm-card crm-section">
      <h3>Список отчётов</h3>
      <div class="crm-report-list">
        <button class="crm-report-item" type="button" data-entity="report" data-id="{{ report.id }}" data-action="select-report"><div><strong>{{ report.fileName }}</strong><small>{{ report.sentAt }}</small></div><span class="crm-badge success" data-status="delivered">Доставлен</span></button>
      </div>
    </div>
    <aside class="crm-card crm-section" data-entity="report-detail" data-id="{{ report.id }}">
      <h3>Детали отчёта</h3>
      <p>Клиент: {{ report.subject }}</p>
      <p>Канал: <span class="crm-badge info" data-status="delivery-edo">ЭДО</span></p>
      <p>Статус: <span class="crm-badge warning" data-status="request-waiting">Ожидает подтверждения</span></p>
      <div class="crm-footer-actions">
        <button class="uk-button uk-button-default crm-button" type="button" data-action="download-report">Скачать</button>
        <button class="uk-button uk-button-default crm-button" type="button" data-action="resend-report">Переотправить</button>
      </div>
    </aside>
  </div>
</section>
