<!-- Reference: static-uikit/pages/contract-wizard.html -->
<!-- UMI NOTE: extraction skeleton only. Render this template inside layout/base main content slot. -->
<!-- UMI NOTE: server-rendered/static-template-first: all form values, dictionaries and selected states are rendered by UMI backend/template macros. -->
<!-- UMI NOTE: global-only JS contract: do not add page-specific runtime renderers; crm-static.js handles reusable controls behavior only. -->
<!-- UMI NOTE: selectable controls (.crm-option-card, .crm-binary-control, .crm-radio-tile, .crm-check-row) must be rendered with consistent checked + .is-active/.is-selected state server-side. -->

<section class="crm-page" data-page="contract-wizard">
  <div class="crm-register-header">
    <div class="crm-breadcrumbs"><a href="subjects.html" data-href="subjects.html">Субъекты</a><span uk-icon="chevron-right"></span><span>Мастер договора</span></div>
    <div class="crm-page-header"><h1 data-entity="page-title">Мастер оформления договора</h1><p class="crm-step-note">Шаг 2 из 3 · Параметры договора</p></div>
  </div>

  <!-- UMI TODO: resolve subject by route id -->
  <!-- UMI TODO: populate contract dictionaries and tariff options -->
  <!-- UMI TODO: handle contract create/update server-side -->
  <form action="#" method="post" data-form="contract-wizard" data-action="submit-contract-wizard" class="crm-card uk-card uk-card-body crm-register-card" data-entity="brokerage-contract" data-id="{{ contract.id }}">
    <div class="crm-form-grid uk-grid-small" uk-grid>
      <div class="uk-width-1-2"><label class="uk-form-label">Клиент</label><input class="uk-input crm-input" name="subject-name" value="{{ subject.name }}"/></div>
      <div class="uk-width-1-2"><label class="uk-form-label">Код клиента</label><input class="uk-input crm-input" name="client-code" value="{{ subject.code }}"/></div>
      <div class="uk-width-1-2"><label class="uk-form-label">Дата начала</label><input type="date" class="uk-input crm-input" name="start-date" value="{{ contract.startDate }}"/></div>
      <div class="uk-width-1-2"><label class="uk-form-label">Срок действия</label><input type="date" class="uk-input crm-input" name="end-date" value="{{ contract.endDate }}"/></div>
    </div>

    <article class="crm-card crm-form-section uk-margin-top" data-entity="contract-settings">
      <div class="crm-form-section-head"><h3>Настройки договора</h3><span class="crm-form-hint">Поля с <span class="crm-required">*</span> обязательны.</span></div>
      <div class="crm-form-grid uk-grid-small" uk-grid>
        <div class="uk-width-1-2"><label class="uk-form-label">Продукт <span class="crm-required">*</span></label><select class="uk-select crm-select" name="product"><option value="brokerage">Брокерский договор</option><option value="trust-management">Договор ДУ</option><option value="depository">Депозитарный договор</option></select></div>
        <div class="uk-width-1-2"><label class="uk-form-label">Тариф/стратегия <span class="crm-required">*</span></label><select class="uk-select crm-select" name="tariff"><option>{{ contract.tariff }}</option></select></div>
        <div class="uk-width-1-1"><label class="uk-form-label">Комментарии</label><textarea class="uk-textarea crm-input" rows="3" name="special-terms" placeholder="Комментарий по условиям"></textarea><span class="crm-field-note">Комментарий опционален и используется для внутренних пометок.</span></div>
      </div>
    </article>

    <article class="crm-card crm-form-section uk-margin-top" data-entity="contract-delivery">
      <div class="crm-form-section-head"><h3>Отчётность и доставка</h3></div>
      <div class="crm-form-grid uk-grid-small" uk-grid>
        <div class="uk-width-1-3"><label class="uk-form-label">Пакет отчётов</label><select class="uk-select crm-select" name="report-package"><option>{{ reports.package }}</option></select></div>
        <div class="uk-width-1-3"><label class="uk-form-label">Канал доставки</label><select class="uk-select crm-select" name="delivery-channel"><option>ЭДО</option><option>Email</option><option>SFTP</option></select></div>
        <div class="uk-width-1-3"><label class="uk-form-label">Периодичность</label><select class="uk-select crm-select" name="delivery-period"><option>Ежедневно</option><option>Еженедельно</option><option>Ежемесячно</option></select></div>
      </div>
    </article>

    <div class="crm-sticky-actions">
      <button type="button" class="uk-button uk-button-default crm-button" data-action="save-contract">Сохранить</button>
      <div class="crm-page-actions">
        <button type="button" class="uk-button uk-button-default crm-button" data-action="export-contract">Экспорт</button>
        <button type="submit" class="uk-button crm-button-primary crm-button" data-action="create-contract">Создать договор</button>
      </div>
    </div>
  </form>
</section>
