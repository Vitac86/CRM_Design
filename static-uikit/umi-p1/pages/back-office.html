<!-- Reference: static-uikit/pages/back-office.html -->
<!-- UMI TODO: render inside layout/base main content slot -->
<section class="crm-page" data-page="back-office">
  <div class="crm-page-header crm-page-header-row"><h1 data-entity="page-title">Отчёты Бэк-офиса</h1><div class="crm-page-actions"><button class="uk-button uk-button-default crm-button" type="button" data-action="export-reports">Экспорт</button></div></div>
  <!-- UMI TODO: resolve delivery channels and statuses from dictionaries -->
  <form action="#" method="post" data-form="back-office-filters" data-action="filter-back-office" class="crm-toolbar crm-filter-panel uk-grid-small" uk-grid data-filter="back-office">
    <div class="uk-width-1-1 uk-width-1-4@m"><input class="uk-input crm-input" name="bo-search" placeholder="Поиск по файлу/клиенту"/></div>
    <div class="uk-width-1-2 uk-width-1-6@m"><select class="uk-select crm-select" name="bo-type"><option>Вид отчёта</option><option>Операционный</option><option>Финансовый</option></select></div>
    <div class="uk-width-1-2 uk-width-1-6@m"><select class="uk-select crm-select" name="bo-channel"><option>Канал</option><option>ЭДО</option><option>Email</option><option>SFTP</option></select></div>
    <div class="uk-width-1-2 uk-width-1-6@m"><button class="uk-button uk-button-default crm-button crm-button-ghost" type="reset" data-action="reset-filters">Очистить фильтры</button></div>
  </form>
  <div class="crm-card crm-table crm-table-wrapper"><table class="uk-table uk-table-divider uk-table-hover"><thead><tr><th>Имя файла</th><th>Отправка</th><th>Канал</th><th>Результат</th><th>Действия</th></tr></thead><tbody>
    <tr data-entity="back-office-report" data-id="{{ backOfficeReport.id }}"><td><div class="crm-row-main">{{ backOfficeReport.fileName }}</div><div class="crm-row-sub">{{ backOfficeReport.clientCode }}</div></td><td>{{ backOfficeReport.sentAt }}</td><td><span class="crm-badge muted" data-status="delivery-email">Email</span></td><td><span class="crm-badge success" data-status="delivered">Доставлен</span></td><td><button class="uk-button uk-button-default crm-button" type="button" data-action="download-report">Скачать</button> <button class="uk-button uk-button-default crm-button" type="button" data-action="resend-report">Переотправить</button></td></tr>
  </tbody></table><div class="crm-empty-state" data-entity="empty-state" hidden><div class="crm-empty-state-title">Нет отчётов</div><div class="crm-empty-state-text">Измените период или параметры фильтра.</div></div></div>
</section>
