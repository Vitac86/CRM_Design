<!-- Reference: static-uikit/pages/agents.html -->
<!-- UMI TODO: render inside layout/base main content slot -->
<section class="crm-page" data-page="agents">
  <div class="crm-page-header crm-page-header-row"><h1 data-entity="page-title">Агенты</h1><div class="crm-page-actions"><button class="uk-button crm-button-primary crm-button" type="button" data-action="add-agent">+ Добавить агента</button></div></div>
  <!-- UMI TODO: bind agent to subject card permission and route -->
  <form action="#" method="post" data-form="agents-filters" data-action="filter-agents" class="crm-toolbar crm-filter-panel uk-grid-small" uk-grid data-filter="agents">
    <div class="uk-width-1-1 uk-width-1-3@m"><input class="uk-input crm-input" name="agent-search" placeholder="Поиск: агент/клиент/ИНН"/></div>
    <div class="uk-width-1-2 uk-width-1-6@m"><select class="uk-select crm-select" name="agent-status"><option>Статус</option><option>Активен</option><option>Приостановлен</option></select></div>
    <div class="uk-width-1-2 uk-width-1-6@m"><button class="uk-button uk-button-default crm-button crm-button-ghost" type="reset" data-action="reset-filters">Очистить фильтры</button></div>
  </form>
  <div class="crm-card crm-table crm-table-wrapper"><table class="uk-table uk-table-divider uk-table-hover"><thead><tr><th>Агент</th><th>Клиент</th><th>Доверенность</th><th>Статус</th><th></th></tr></thead><tbody>
    <tr data-entity="agent" data-id="{{ agent.id }}"><td>{{ agent.name }}</td><td>{{ agent.subject }}</td><td>{{ agent.powerOfAttorney }}</td><td><span class="crm-badge success" data-status="active">Активен</span></td><td><a href="subject-card.html" data-href="subject-card.html" data-action="open-subject-card">Карточка субъекта</a></td></tr>
  </tbody></table></div>
</section>
