<!-- Reference: static-uikit/pages/middle-office-clients.html -->
<!-- UMI TODO: render inside layout/base main content slot -->
<section class="crm-page" data-page="middle-office-clients">
  <div class="crm-page-header"><h1 data-entity="page-title">Журнал клиентов (мидл-офис)</h1></div>
  <!-- UMI TODO: resolve contracts/accounts/rights columns by subject -->
  <form action="#" method="post" data-form="middle-office-clients-filters" data-action="filter-middle-office-clients" class="crm-toolbar crm-filter-panel uk-grid-small" uk-grid data-filter="middle-office-clients">
    <div class="uk-width-1-1 uk-width-1-3@m"><input class="uk-input crm-input" name="clients-search" placeholder="Поиск по клиенту/коду/ИНН"/></div>
    <div class="uk-width-1-2 uk-width-1-6@m"><select class="uk-select crm-select" name="clients-status"><option>Статус</option><option>Активен</option><option>Требует проверки</option></select></div>
    <div class="uk-width-1-2 uk-width-1-6@m"><button class="uk-button uk-button-default crm-button crm-button-ghost" type="reset" data-action="reset-filters">Очистить фильтры</button></div>
  </form>
  <div class="crm-card crm-table crm-table-wrapper"><table class="uk-table uk-table-divider uk-table-hover"><thead><tr><th>Код</th><th>Клиент</th><th>Договоры</th><th>Счета</th><th>Права</th><th>Статус</th></tr></thead><tbody>
    <tr data-entity="middle-office-client" data-id="{{ client.id }}" data-href="subject-card.html"><td>{{ client.code }}</td><td><a href="subject-card.html" data-href="subject-card.html" data-action="open-subject-card">{{ client.name }}</a></td><td>{{ client.contracts }}</td><td>{{ client.accounts }}</td><td>{{ client.rights }}</td><td><span class="crm-badge success" data-status="active">Активен</span></td></tr>
  </tbody></table></div>
</section>
