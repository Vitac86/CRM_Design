<!-- Reference: static-uikit/pages/brokerage.html -->
<!-- UMI TODO: render inside layout/base main content slot -->
<section class="crm-page" data-page="brokerage">
  <div class="crm-page-header crm-page-header-row"><h1 data-entity="page-title">Брокерская деятельность</h1><div class="crm-page-actions"><button class="uk-button uk-button-default crm-button" type="button" data-action="export-brokerage">Экспорт</button></div></div>
  <!-- UMI TODO: render brokerage list and statuses from backend -->
  <form action="#" method="post" data-form="brokerage-filters" data-action="filter-brokerage" class="crm-toolbar crm-filter-panel uk-grid-small" uk-grid data-filter="brokerage">
    <div class="uk-width-1-1 uk-width-1-3@m"><input class="uk-input crm-input" name="brokerage-search" placeholder="Поиск: договор/код/клиент/менеджер"/></div>
    <div class="uk-width-1-2 uk-width-1-6@m"><select class="uk-select crm-select" name="brokerage-status"><option>Статус</option><option>Активен</option><option>На паузе</option></select></div>
    <div class="uk-width-1-2 uk-width-1-6@m"><button class="uk-button uk-button-default crm-button crm-button-ghost" type="reset" data-action="reset-filters">Очистить фильтры</button></div>
  </form>
  <div class="crm-card crm-table crm-table-wrapper"><table class="uk-table uk-table-divider uk-table-hover"><thead><tr><th>Договор</th><th>Клиент</th><th>Менеджер</th><th>Дата открытия</th><th>Статус</th></tr></thead><tbody>
    <tr data-entity="brokerage-contract" data-id="{{ brokerage.id }}"><td>{{ brokerage.number }}</td><td>{{ brokerage.subject }}</td><td>{{ brokerage.manager }}</td><td>{{ brokerage.openedAt }}</td><td><span class="crm-badge success" data-status="active">Активен</span></td></tr>
    <tr data-entity="brokerage-contract" data-id="{{ brokerage.id2 }}"><td>{{ brokerage.number2 }}</td><td>{{ brokerage.subject2 }}</td><td>{{ brokerage.manager2 }}</td><td>{{ brokerage.openedAt2 }}</td><td><span class="crm-badge warning" data-status="paused">На паузе</span></td></tr>
  </tbody></table></div>
</section>
