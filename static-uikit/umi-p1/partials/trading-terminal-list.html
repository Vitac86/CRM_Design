<div class="crm-report-list" data-entity="trading-terminal-list">
  <div class="crm-report-item" data-entity="trading-terminal" data-id="{{ terminal.id }}">
    <div><strong>{{ terminal.type }}</strong><small>Логин {{ terminal.login }} · UID {{ terminal.uid }}</small></div>
    <div class="crm-inline-badges"><span class="crm-badge success" data-status="connected">{{ terminal.status }}</span></div>
    <small>Выдан: {{ terminal.issuedAt }}</small>
    <div class="crm-footer-actions"><button class="uk-button uk-button-default crm-button" type="button" data-action="reset-terminal-password">Сбросить пароль</button></div>
  </div>
</div>
