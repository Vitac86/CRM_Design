<article class="crm-card crm-section" data-entity="contract-form-section">
  <div class="crm-section-head"><h3>Настройки договора</h3></div>
  <div class="crm-form-grid uk-grid-small" uk-grid>
    <div class="uk-width-1-2"><label class="uk-form-label">Тариф/стратегия</label><select class="uk-select crm-select" name="tariff"><option>{{ contract.tariff }}</option></select></div>
    <div class="uk-width-1-2"><label class="uk-form-label">Канал отчётности</label><select class="uk-select crm-select" name="delivery-channel"><option>ЭДО</option><option>Email</option><option>SFTP</option></select></div>
    <div class="uk-width-1-1"><label class="uk-form-label">Комментарии</label><textarea class="uk-textarea crm-input" name="comment" rows="3"></textarea></div>
  </div>
</article>
