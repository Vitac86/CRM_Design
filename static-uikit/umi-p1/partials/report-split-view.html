<div class="crm-split-view" data-entity="report-split-view">
  <div class="crm-card crm-section">
    <h3>Список отчётов</h3>
    <div class="crm-report-list">
      <button class="crm-report-item" type="button" data-entity="report" data-id="{{ report.id }}" data-action="select-report"><div><strong>{{ report.fileName }}</strong><small>{{ report.sentAt }}</small></div><span class="crm-badge success" data-status="delivered">Доставлен</span></button>
    </div>
  </div>
  <aside class="crm-card crm-section" data-entity="report-detail" data-id="{{ report.id }}">
    <h3>Детали</h3>
    <p>Канал: <span class="crm-badge info" data-status="delivery-edo">ЭДО</span></p>
    <p>Статус: <span class="crm-badge warning" data-status="request-waiting">Ожидает</span></p>
    <div class="crm-footer-actions"><button class="uk-button uk-button-default crm-button" type="button" data-action="download-report">Скачать</button><button class="uk-button uk-button-default crm-button" type="button" data-action="resend-report">Переотправить</button></div>
  </aside>
</div>
