<form action="#" method="post" data-form="subject-register" data-action="create-subject" class="crm-form-grid uk-grid-small" uk-grid>
  <div class="uk-width-1-1 crm-form-section">
    <div class="crm-form-section-head"><h3>Идентификаторы и назначение</h3><span class="crm-form-hint">Поля, отмеченные <span class="crm-required">*</span>, обязательны.</span></div>
    <div class="crm-form-grid uk-grid-small" uk-grid>
      <div class="uk-width-1-3@m"><label class="uk-form-label">ИНН <span class="crm-required">*</span></label><input class="uk-input crm-input" name="inn" placeholder="7704132901"/><span class="crm-field-note">Укажите ИНН без пробелов.</span></div>
      <div class="uk-width-1-3@m"><label class="uk-form-label">ОГРН</label><input class="uk-input crm-input" name="ogrn" placeholder="1027700132195"/></div>
      <div class="uk-width-1-3@m"><label class="uk-form-label">Менеджер <span class="crm-required">*</span></label><select class="uk-select crm-select" name="manager"><option>Иванов И.И.</option></select></div>
      <div class="uk-width-1-1"><label class="uk-form-label">Резидентство</label><div class="crm-binary-control" data-entity="yes-no-pills"><label class="is-active"><input class="uk-radio" type="radio" name="resident" checked/><span>Резидент</span></label><label><input class="uk-radio" type="radio" name="resident"/><span>Нерезидент</span></label></div></div>
    </div>
  </div>
</form>
