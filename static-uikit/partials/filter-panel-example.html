<form action="#" method="post" data-form="subjects-filters" data-action="filter-subjects" class="crm-toolbar crm-filter-panel uk-grid-small" uk-grid data-filter="subjects">
  <div class="uk-width-1-1 uk-width-1-3@m"><input class="uk-input crm-input" name="subject-search" placeholder="Поиск по клиенту, коду, ИНН или email"/></div>
  <div class="uk-width-1-2 uk-width-1-6@m"><select class="uk-select crm-select" name="subject-type"><option>Тип</option></select></div>
  <div class="uk-width-1-2 uk-width-1-6@m"><select class="uk-select crm-select" name="resident-type"><option>Резидентство</option></select></div>
  <div class="uk-width-1-2 uk-width-1-6@m"><button type="reset" class="uk-button uk-button-default crm-button crm-button-ghost" data-action="reset-filters">Сбросить всё</button></div>
</form>
