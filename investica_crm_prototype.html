<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Investica CRM — Дизайн интерфейса</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=JetBrains+Mono:wght@400;500&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
:root{
--nav-w:210px;--bg:#f0f2f8;--surface:#fff;--navy:#0a0e27;--blue:#4355ff;
--border:rgba(10,14,39,0.1);--text1:#0a0e27;--text2:#4a5078;--text3:#8a90b0;
--hover-bg:rgba(67,85,255,0.04);--tag-bg:rgba(67,85,255,0.07);--tag-text:#3040cc;
--green:#1a8a5a;--green-bg:rgba(26,138,90,0.08);
--orange:#c97a1a;--orange-bg:rgba(201,122,26,0.08);
--red:#a02020;--red-bg:rgba(192,48,48,0.08);
--purple:#6a40cc;--purple-bg:rgba(106,64,204,0.08);
}
html,body{height:100%}
body{font-family:'DM Sans',sans-serif;font-size:13px;color:var(--text1);background:#dde0e8;overflow:hidden}

/* === TOP SCREEN SELECTOR === */
.screen-bar{position:fixed;top:0;left:0;right:0;background:#fff;border-bottom:0.5px solid var(--border);padding:10px 20px;display:flex;align-items:center;gap:16px;z-index:100;box-shadow:0 1px 4px rgba(10,14,39,0.06)}
.screen-bar-title{font-weight:500;font-size:14px;margin-right:8px;color:var(--navy)}
.screen-bar-title span{color:var(--blue);font-weight:500}
.screen-select{padding:6px 14px;border-radius:8px;border:0.5px solid var(--border);font-family:inherit;font-size:12px;background:var(--bg);color:var(--text1);cursor:pointer;outline:none;min-width:380px;transition:border 0.15s}
.screen-select:focus{border-color:var(--blue)}
.screen-counter{margin-left:auto;font-size:11px;color:var(--text3);font-family:'JetBrains Mono',monospace}

/* === APP === */
.app-wrap{position:fixed;top:54px;left:0;right:0;bottom:0;overflow:auto;padding:20px;display:flex;justify-content:center}
.app{display:flex;width:100%;max-width:1280px;min-height:calc(100vh - 94px);background:var(--bg);border-radius:12px;border:0.5px solid var(--border);overflow:hidden;box-shadow:0 4px 24px rgba(10,14,39,0.1)}

/* === NAV === */
.nav{width:var(--nav-w);background:var(--navy);padding:20px 0;display:flex;flex-direction:column;flex-shrink:0}
.nav-brand{padding:0 16px 22px;display:flex;flex-direction:column;gap:1px}
.brand-name{font-size:22px;font-weight:500;color:#fff;letter-spacing:0.5px;line-height:1.1}
.brand-sub{font-size:7.5px;color:rgba(255,255,255,0.3);letter-spacing:3px;text-transform:uppercase;margin-top:4px}
.nav-item{display:flex;align-items:center;gap:9px;padding:8px 16px;color:rgba(255,255,255,0.4);cursor:pointer;transition:all 0.15s;font-size:12.5px;border-left:2px solid transparent;text-decoration:none}
.nav-item:hover{background:rgba(255,255,255,0.05);color:rgba(255,255,255,0.8)}
.nav-item.active{background:rgba(67,85,255,0.15);color:#fff;border-left-color:var(--blue);font-weight:500}
.nav-item svg{width:15px;height:15px;flex-shrink:0;opacity:0.4}
.nav-item.active svg{opacity:0.9}
.nav-divider{height:0.5px;background:rgba(255,255,255,0.08);margin:10px 16px}
.nav-spacer{flex:1}

/* === MAIN === */
.main{flex:1;display:flex;flex-direction:column;min-width:0}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;border-bottom:0.5px solid var(--border);background:var(--surface)}
.topbar h1{font-size:16px;font-weight:500}
.tba{display:flex;gap:8px}
.btn{padding:6px 14px;border-radius:8px;font-size:12px;font-weight:500;cursor:pointer;font-family:inherit;border:none;transition:all 0.15s}
.bp{background:var(--blue);color:#fff}.bp:hover{background:#3345e0}
.bg-btn{background:transparent;color:var(--text2);border:0.5px solid var(--border)}.bg-btn:hover{background:var(--hover-bg);color:var(--blue)}

/* === CLIENT/COUNTERPARTY HEADER === */
.header{padding:20px 24px 0;background:var(--surface);border-bottom:0.5px solid var(--border)}
.ht{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.ci{display:flex;align-items:center;gap:16px}
.av{width:48px;height:48px;border-radius:12px;background:var(--navy);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:500;font-size:16px;flex-shrink:0}
.cm h2{font-size:18px;font-weight:500;margin-bottom:4px}
.cc{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text3)}
.tabs{display:flex;gap:0;margin-top:4px}
.tab{padding:10px 18px;font-size:13px;color:var(--text3);cursor:pointer;border-bottom:2px solid transparent;transition:all 0.15s}
.tab:hover{color:var(--text1)}
.tab.active{color:var(--blue);border-bottom-color:var(--blue);font-weight:500}
.content{flex:1;padding:20px 24px;overflow:auto}

/* === SECTIONS === */
.section{margin-bottom:24px}
.section-title{font-size:13px;font-weight:500;margin-bottom:12px;padding-bottom:6px;border-bottom:0.5px solid var(--border)}
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;padding-bottom:6px;border-bottom:0.5px solid var(--border)}
.fg{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px 24px}
.field{margin-bottom:4px}
.field .lbl{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:0.3px;margin-bottom:1px}
.field .val{font-size:12px;color:var(--text1)}
.field .val.mono{font-family:'JetBrains Mono',monospace;font-size:11px}
.field .val.bold{font-weight:500}

/* === MANAGER/AGENT === */
.people-row{display:flex;gap:16px}
.person-card{flex:1;display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:8px;margin-top:4px}
.person-card.manager{background:rgba(67,85,255,0.04);border:0.5px solid rgba(67,85,255,0.12)}
.person-card.agent{background:rgba(26,138,90,0.04);border:0.5px solid rgba(26,138,90,0.12)}
.pa{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-size:11px;font-weight:500;flex-shrink:0}
.pa.mgr{background:var(--blue)}.pa.agt{background:var(--green)}
.pi{flex:1}
.pn{font-size:12px;font-weight:500}
.pr{font-size:10px;color:var(--text3)}
.pc{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--text2);margin-top:2px}
.plabel{font-size:9px;font-weight:500;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:6px}
.plabel.mgr{color:var(--blue)}.plabel.agt{color:var(--green)}

/* === REPORTS === */
.report-methods{display:flex;gap:10px;margin-top:4px}
.rm-card{flex:1;display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:8px;border:0.5px solid var(--border)}
.rm-icon{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.rm-icon svg{width:16px;height:16px}
.rm-icon.email{background:var(--tag-bg);color:var(--tag-text)}
.rm-icon.lk{background:var(--green-bg);color:var(--green)}
.rm-info{flex:1}
.rm-name{font-size:12px;font-weight:500;margin-bottom:1px}
.rm-detail{font-size:10px;color:var(--text3)}
.rm-detail.mono{font-family:'JetBrains Mono',monospace}

/* === TABLES === */
table{width:100%;border-collapse:collapse;table-layout:fixed}
thead{position:sticky;top:0;z-index:2}
th{padding:0;background:var(--surface);vertical-align:bottom;border-bottom:0.5px solid var(--border)}
th .tl{display:block;padding:6px 10px;font-size:10px;font-weight:500;color:var(--text3);text-transform:uppercase;letter-spacing:0.5px;background:var(--bg);white-space:nowrap}
th .tf{display:block;padding:5px 10px 7px}
td{padding:9px 10px;border-bottom:0.5px solid var(--border);vertical-align:middle;background:var(--surface);font-size:12px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
tr{transition:background 0.1s}
tr:hover td{background:var(--hover-bg)}
.si{width:100%;padding:4px 8px;border-radius:8px;border:0.5px solid var(--border);font-size:10px;color:var(--text1);font-family:inherit;outline:none;background:var(--bg);box-sizing:border-box}
.si:focus{border-color:var(--blue)}.si::placeholder{color:var(--text3)}
.fd{position:relative;width:100%}
.fb{display:flex;align-items:center;justify-content:space-between;width:100%;padding:4px 8px;border-radius:8px;border:0.5px solid var(--border);background:var(--bg);font-size:10px;color:var(--text2);cursor:pointer;font-family:inherit;box-sizing:border-box}
.fb:hover{border-color:var(--blue);color:var(--blue)}
.fb svg{width:9px;height:9px;opacity:0.4;flex-shrink:0}
.cn{font-weight:500;font-size:12px;color:var(--text1)}
.inn{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text3)}
.ct{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text2)}
.code-cell{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text1);font-weight:500}
.dt{font-size:11px;color:var(--text2)}
.res{font-size:11px;color:var(--text2)}
.tag{padding:2px 8px;border-radius:20px;font-size:10px;font-weight:500;display:inline-block;background:var(--tag-bg);color:var(--tag-text)}
.role-tag{padding:2px 8px;border-radius:20px;font-size:10px;font-weight:500;display:inline-block;background:rgba(67,85,255,0.05);color:var(--blue)}
.tag-active{background:var(--green-bg);color:var(--green)}
.tag-closed{background:var(--red-bg);color:var(--red)}
.mono{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text1);font-weight:500}
.muted{color:var(--text3);font-size:11px}
.st{display:flex;align-items:center;gap:5px;font-size:11px}
.sd{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.sa .sd{background:var(--blue)}.sa{color:var(--tag-text)}
.sc .sd{background:var(--text3)}.sc{color:var(--text3)}
.sr .sd{background:transparent;border:1.5px solid var(--text3)}.sr{color:var(--text2)}
.sf .sd{background:#c03030}.sf{color:var(--red)}

/* === BADGES === */
.badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:9px;font-weight:500}
.b-on{background:var(--green-bg);color:var(--green)}
.b-off{background:var(--bg);color:var(--text3)}
.b-active{background:var(--green-bg);color:var(--green)}
.b-expired{background:var(--red-bg);color:var(--red)}
.b-qual{background:var(--green-bg);color:var(--green)}
.b-noqual{background:var(--tag-bg);color:var(--tag-text)}
.b-start{background:var(--tag-bg);color:var(--tag-text)}
.b-standard{background:var(--green-bg);color:var(--green)}
.b-special{background:var(--orange-bg);color:var(--orange)}
.b-high{background:var(--red-bg);color:var(--red)}

/* === RIGHTS === */
.rights-row{display:flex;gap:10px}
.right-card{flex:1;display:flex;align-items:center;gap:12px;padding:12px 14px;border-radius:8px;border:0.5px solid var(--border);background:var(--surface);transition:border 0.15s}
.right-card:hover{border-color:rgba(67,85,255,0.2)}
.right-icon{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.right-icon.money{background:var(--green-bg);color:var(--green)}
.right-icon.secu{background:var(--tag-bg);color:var(--tag-text)}
.right-icon svg{width:18px;height:18px}
.right-info{flex:1;min-width:0}
.right-name{font-size:12px;font-weight:500;margin-bottom:2px}
.right-desc{font-size:10px;color:var(--text3)}
.toggle{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:20px;font-size:10px;font-weight:500;cursor:pointer;flex-shrink:0}
.toggle.yes{background:var(--green-bg);color:var(--green)}
.toggle.no{background:var(--red-bg);color:var(--red)}
.toggle-dot{width:6px;height:6px;border-radius:50%}
.toggle.yes .toggle-dot{background:var(--green)}
.toggle.no .toggle-dot{background:var(--red)}

/* === DOCUMENTS === */
.doc-row{display:flex;align-items:center;gap:12px;padding:10px 14px;background:var(--surface);border:0.5px solid var(--border);border-radius:8px;margin-bottom:8px}
.doc-type{flex-shrink:0;width:200px}
.doc-type select{width:100%;padding:6px 24px 6px 10px;border-radius:8px;border:0.5px solid var(--border);font-size:11px;color:var(--text1);font-family:inherit;background:var(--bg);outline:none;cursor:pointer;appearance:none;-webkit-appearance:none}
.doc-file{flex:1;display:flex;align-items:center;gap:10px;min-width:0}
.doc-icon{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:9px;font-weight:500;text-transform:uppercase}
.doc-icon.pdf{background:rgba(192,48,48,0.1);color:var(--red)}
.doc-icon.docx{background:var(--tag-bg);color:var(--tag-text)}
.doc-icon.jpg{background:rgba(184,134,11,0.1);color:#8a6a08}
.doc-fn{font-size:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.doc-sz{font-size:10px;color:var(--text3);white-space:nowrap}
.doc-dt{font-size:10px;color:var(--text3);width:80px;text-align:right;flex-shrink:0}
.upload-zone{margin-top:16px;border:1.5px dashed var(--border);border-radius:12px;padding:28px;display:flex;flex-direction:column;align-items:center;gap:10px;cursor:pointer}
.upload-zone:hover{border-color:var(--blue);background:var(--hover-bg)}
.upload-icon{width:40px;height:40px;border-radius:50%;background:var(--tag-bg);display:flex;align-items:center;justify-content:center}
.upload-icon svg{width:20px;height:20px;color:var(--blue)}
.upload-text{font-size:13px;font-weight:500}
.upload-hint{font-size:11px;color:var(--text3)}
.btn-sm{padding:4px 12px;border-radius:8px;font-size:11px;font-weight:500;cursor:pointer;font-family:inherit;border:0.5px solid var(--border);background:transparent;color:var(--text2)}
.btn-sm:hover{border-color:var(--blue);color:var(--blue);background:var(--hover-bg)}

/* === HISTORY === */
.old-val{padding:2px 6px;border-radius:4px;background:rgba(192,48,48,0.08);color:var(--red);font-size:11px;text-decoration:line-through;display:inline-block}
.new-val{padding:2px 6px;border-radius:4px;background:rgba(26,138,90,0.08);color:var(--green);font-size:11px;display:inline-block}
.arrow{color:var(--text3);font-size:11px;margin:0 4px}
.subj{font-size:11px;color:var(--text1);font-weight:500}
.subj-code{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--text3);display:block;margin-top:1px}

/* === LINKS === */
.link-card{display:flex;align-items:center;gap:14px;padding:14px 16px;background:var(--surface);border:0.5px solid var(--border);border-radius:8px;margin-bottom:10px}
.link-card:hover{border-color:rgba(67,85,255,0.25)}
.link-av{width:40px;height:40px;border-radius:8px;background:var(--bg);display:flex;align-items:center;justify-content:center;font-weight:500;font-size:13px;color:var(--tag-text);flex-shrink:0}
.link-info{flex:1;min-width:0}
.link-name{font-size:13px;font-weight:500;margin-bottom:2px}
.link-detail{font-size:11px;color:var(--text3);display:flex;gap:12px}
.link-date{font-size:10px;color:var(--text3);flex-shrink:0;white-space:nowrap}

/* === KANBAN === */
.stats{display:flex;gap:10px;padding:14px 20px;border-bottom:0.5px solid var(--border);background:var(--surface)}
.stat-card{flex:1;padding:10px 14px;border-radius:8px;background:var(--bg)}
.stat-num{font-size:20px;font-weight:500;margin-bottom:2px}
.stat-label{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:0.3px}
.s-new .stat-num{color:var(--blue)}
.s-review .stat-num{color:var(--orange)}
.s-fix .stat-num{color:var(--purple)}
.s-done .stat-num{color:var(--green)}
.s-reject .stat-num{color:var(--red)}
.s-all .stat-num{color:var(--blue)}
.s-q .stat-num{color:var(--green)}
.s-nq .stat-num{color:var(--text2)}
.s-h .stat-num{color:var(--orange)}
.s-g .stat-num{color:var(--green)}
.s-o .stat-num{color:var(--orange)}
.s-r .stat-num{color:var(--red)}
.board{flex:1;display:flex;gap:12px;padding:16px 20px;overflow-x:auto}
.column{flex:1;min-width:180px;display:flex;flex-direction:column}
.col-header{display:flex;align-items:center;gap:6px;padding:8px 10px;margin-bottom:8px;border-radius:8px;font-size:11px;font-weight:500}
.col-header .dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.col-header .count{margin-left:auto;font-size:10px;font-weight:400;color:var(--text3)}
.ch-new{background:rgba(67,85,255,0.06);color:var(--blue)}.ch-new .dot{background:var(--blue)}
.ch-review{background:var(--orange-bg);color:var(--orange)}.ch-review .dot{background:var(--orange)}
.ch-fix{background:var(--purple-bg);color:var(--purple)}.ch-fix .dot{background:var(--purple)}
.ch-done{background:var(--green-bg);color:var(--green)}.ch-done .dot{background:var(--green)}
.ch-reject{background:var(--red-bg);color:var(--red)}.ch-reject .dot{background:var(--red)}
.col-cards{flex:1;display:flex;flex-direction:column;gap:8px}
.card{background:var(--surface);border:0.5px solid var(--border);border-radius:8px;padding:10px 12px;cursor:pointer}
.card:hover{border-color:rgba(67,85,255,0.25);box-shadow:0 1px 4px rgba(10,14,39,0.06)}
.card-name{font-size:12px;font-weight:500;margin-bottom:4px}
.card-code{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--text3);margin-bottom:6px}
.card-tags{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:6px}
.ct-tag{padding:1px 6px;border-radius:12px;font-size:9px;font-weight:500;background:var(--tag-bg);color:var(--tag-text)}
.ct-res-tag{background:rgba(67,85,255,0.04);color:var(--blue)}
.card-meta{display:flex;align-items:center;justify-content:space-between;font-size:10px;color:var(--text3)}
.card-return{display:flex;align-items:center;gap:4px;margin-top:6px;padding-top:6px;border-top:0.5px solid var(--border);font-size:10px;color:var(--purple)}
.card-issues{display:flex;align-items:center;gap:4px;margin-top:6px;padding-top:6px;border-top:0.5px solid var(--border);font-size:10px;color:var(--red)}
.card-iter{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--text3);padding:1px 5px;border-radius:8px;background:var(--bg)}

/* === TRADING METHODS/TERMINALS === */
.method-card,.term-card{display:flex;align-items:center;gap:12px;padding:10px 14px;background:var(--surface);border:0.5px solid var(--border);border-radius:8px;margin-bottom:8px}
.method-icon{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.method-icon.quik{background:var(--tag-bg);color:var(--tag-text)}
.method-icon.voice{background:var(--orange-bg);color:var(--orange)}
.method-icon svg,.term-icon svg{width:18px;height:18px}
.term-icon{width:36px;height:36px;border-radius:8px;background:var(--bg);display:flex;align-items:center;justify-content:center;flex-shrink:0;color:var(--text2)}
.method-info,.term-info{flex:1}
.method-name,.term-name{font-size:12px;font-weight:500;margin-bottom:2px}
.method-desc,.term-meta{font-size:10px;color:var(--text3)}
.term-meta{display:flex;gap:12px}
.code-word{display:inline-flex;align-items:center;gap:6px;padding:4px 12px;border-radius:8px;background:var(--bg);border:0.5px solid var(--border);font-family:'JetBrains Mono',monospace;font-size:12px;letter-spacing:1px}
.disp-card{display:flex;align-items:center;gap:12px;padding:10px 14px;background:rgba(67,85,255,0.04);border:0.5px solid rgba(67,85,255,0.12);border-radius:8px;margin-top:4px}
.disp-av{width:32px;height:32px;border-radius:50%;background:var(--blue);display:flex;align-items:center;justify-content:center;color:#fff;font-size:11px;font-weight:500;flex-shrink:0}
.disp-info{flex:1}
.disp-name{font-size:12px;font-weight:500}
.disp-detail{font-size:10px;color:var(--text3);margin-top:1px}
.disp-dates{flex-shrink:0;text-align:right}
.disp-dates .dl{font-size:9px;color:var(--text3)}
.disp-dates .dv{font-size:11px}

/* === MIDDLE OFFICE === */
.mo-layout{display:flex;flex:1;overflow:hidden}
.list-panel{flex:1;display:flex;flex-direction:column;overflow:hidden;border-right:0.5px solid var(--border);min-width:0}
.list-toolbar{display:flex;align-items:center;gap:6px;padding:10px 16px;border-bottom:0.5px solid var(--border);background:var(--surface)}
.si-w{flex:1}

function switchScreen(id){
  const nav = navFor[id] || 'clients';
  document.getElementById('sidebar').innerHTML = buildNav(nav);
  document.getElementById('mainContent').innerHTML = screens[id];
  // Update counter
  const num = parseInt(id.substr(1));
  document.getElementById('counter').textContent = num + ' / 14';
  document.getElementById('screenSelect').value = id;
  // Scroll app area to top
  document.querySelector('.app-wrap').scrollTop = 0;
  // Update URL hash
  history.replaceState(null,'','#'+id);
}

// Init
const hash = window.location.hash.replace('#','') || 's1';
switchScreen(hash in screens ? hash : 's1');

// Keyboard navigation
document.addEventListener('keydown', function(e){
  if(e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT') return;
  const current = parseInt(document.getElementById('counter').textContent);
  if(e.key === 'ArrowRight' && current < 14) switchScreen('s' + (current + 1));
  if(e.key === 'ArrowLeft' && current > 1) switchScreen('s' + (current - 1));
});
</script>
